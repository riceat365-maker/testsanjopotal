        function renderShops(filter = 'すべて') {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = '';

            const filtered = filter === 'すべて' ? shops : shops.filter(s => s.category === filter);

            filtered.forEach(shop => {
                const card = document.createElement('div');
                card.className = 'bg-[#141414] border border-white/5 rounded-3xl overflow-hidden transition-all group cursor-pointer hover:border-amber-600/30 hover:translate-y-[-4px] shadow-xl hover:shadow-amber-900/10 fade-in';
                card.onclick = () => showDetail(shop.id);
                
                card.innerHTML = `
                    <div class="h-60 overflow-hidden relative">
                        <img src="${shop.image}" alt="${shop.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000 opacity-70 group-hover:opacity-100" onerror="this.src='https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80&w=800'">
                        <div class="absolute top-5 left-5 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold text-amber-500 border border-white/10 uppercase tracking-widest">
                            ${shop.category}
                        </div>
                    </div>
                    <div class="p-8">
                        <h2 class="text-2xl font-bold text-white mb-4 group-hover:text-amber-500 transition-colors tracking-tight">${shop.name}</h2>
                        <p class="text-gray-500 text-sm leading-relaxed line-clamp-2 mb-6">${shop.description}</p>
                        <div class="flex items-center gap-6 text-[11px] text-gray-500 pt-6 border-t border-white/5 font-bold uppercase tracking-wider">
                            <span class="flex items-center gap-1.5"><i class="fas fa-wallet text-amber-600"></i> ${shop.price}</span>
                            <span class="flex items-center gap-1.5"><i class="fas fa-map-marker-alt text-amber-600"></i> ${shop.area}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterShops(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.category === cat) {
                    btn.classList.add('text-amber-500', 'border-b-2', 'border-amber-500');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('text-amber-500', 'border-b-2', 'border-amber-500');
                    btn.classList.add('text-gray-600');
                }
            });
            renderShops(cat);
        }

        function showDetail(id) {
            const shop = shops.find(s => s.id === id);
            const detailView = document.getElementById('detail-view');
            const listView = document.getElementById('list-view');

            detailView.innerHTML = `
                <div class="relative h-[45vh] w-full overflow-hidden">
                    <img src="${shop.image}" alt="${shop.name}" class="w-full h-full object-cover opacity-60 scale-105" onerror="this.src='https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80&w=1200'">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent"></div>
                    <button onclick="hideDetail()" class="absolute top-6 left-6 bg-black/40 backdrop-blur-xl p-3 rounded-full border border-white/10 hover:bg-amber-600 transition-all group z-50">
                        <i class="fas fa-arrow-left text-white"></i>
                    </button>
                </div>

                <div class="max-w-3xl mx-auto px-6 -mt-24 relative z-10">
                    <div class="bg-[#141414] border border-white/5 rounded-3xl p-8 shadow-2xl">
                        <div class="mb-6">
                            <span class="text-amber-500 text-xs font-bold tracking-widest uppercase mb-2 block">${shop.category}</span>
                            <h1 class="text-3xl md:text-5xl font-black text-white leading-tight">${shop.name}</h1>
                        </div>

                        <div class="flex flex-wrap gap-2 mb-8">
                            ${shop.tags.map(tag => `<span class="bg-white/5 text-gray-400 text-[11px] px-3 py-1 rounded-full border border-white/10">${tag}</span>`).join('')}
                        </div>

                        <p class="text-gray-300 leading-relaxed text-lg mb-12 whitespace-pre-wrap">${shop.longDescription}</p>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 py-8 border-t border-white/5">
                            <div class="space-y-6">
                                <div class="flex items-start gap-4">
                                    <div class="p-2 bg-amber-500/10 rounded-lg"><i class="fas fa-map-pin text-amber-500"></i></div>
                                    <div>
                                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Location</span>
                                        <p class="text-sm text-gray-300 mt-1">${shop.address}</p>
                                        ${shop.googleMap ? `<a href="${shop.googleMap}" target="_blank" class="text-amber-500 text-xs font-bold mt-2 inline-flex items-center gap-1 hover:underline">Google Mapで開く <i class="fas fa-external-link-alt text-[10px]"></i></a>` : ''}
                                    </div>
                                </div>
                                <div class="flex items-start gap-4">
                                    <div class="p-2 bg-amber-500/10 rounded-lg"><i class="fas fa-wallet text-amber-500"></i></div>
                                    <div>
                                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Budget</span>
                                        <p class="text-sm text-gray-300 mt-1">${shop.price}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="space-y-6">
                                <div class="flex items-start gap-4">
                                    <div class="p-2 bg-amber-500/10 rounded-lg"><i class="fas fa-clock text-amber-500"></i></div>
                                    <div>
                                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Business Info</span>
                                        <p class="text-sm text-gray-300 mt-1">営業: ${shop.openingHours}</p>
                                        <p class="text-sm text-gray-300">定休日: ${shop.holiday}</p>
                                    </div>
                                </div>
                                ${shop.instagram ? `
                                <div class="flex items-start gap-4">
                                    <div class="p-2 bg-amber-500/10 rounded-lg"><i class="fab fa-instagram text-amber-500"></i></div>
                                    <div>
                                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Social</span>
                                        <div class="mt-1">
                                            <a href="${shop.instagram}" target="_blank" class="text-sm text-white hover:text-amber-500 transition-colors flex items-center gap-1">Instagramを見る <i class="fas fa-external-link-alt text-[10px]"></i></a>
                                        </div>
                                    </div>
                                </div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            listView.classList.add('hidden');
            detailView.classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function hideDetail() {
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('list-view').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        // 初期描画
        renderShops();
    </script>
</body>
</html>
